# default config: https://github.com/sxyazi/yazi/blob/ae4c138f49e00a64b478318ed9c7e9072fef8c52/yazi-config/preset/yazi-default.toml
[mgr]
linemode = "size_and_mtime"

[plugin]
prepend_fetchers = [
    { id = "git", url = "*", run = "git" },
]
append_previewers = [
    { url = "*", run = "file-extra-metadata" },
]
append_spotters = [
    { url = "*", run = "file-extra-metadata" },
]

[opener]
# Windows: `start ""` opens with the default associated app (same as Explorer double-click).
system_open = [
    { run = 'start "" %s1', desc = "Open", for = "windows", orphan = true },
]

openwith = [
    { run = 'M:\Script\Pwsh\config\yazi\apps\openwithsh.exe %1', orphan = true, desc = "Open with...", for = "windows" },
]

# default rule: https://github.com/sxyazi/yazi/blob/ae4c138f49e00a64b478318ed9c7e9072fef8c52/yazi-config/preset/yazi-default.toml#L66
[open]
prepend_rules = [
    # `url = "*"` does not match dirs (`foo/`); without this, preset `*/` uses `edit` first (VS Code).
    { url = "*/", use = [ "system_open", "edit", "openwith", "reveal" ] },
    { mime = "text/*", use = [ "edit", "openwith", "reveal" ] },
    { mime = "image/*", use = [ "open", "openwith", "reveal" ] },
    { mime = "{audio,video}/*", use = [ "play", "openwith", "reveal" ] },
    { mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "openwith", "reveal" ] },
    # Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "openwith", "reveal" ] },
	# Empty file
	{ mime = "inode/empty", use = [ "edit", "openwith", "reveal" ] },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", use = "download" },
    { url = "*", use = [ "system_open", "openwith", "reveal" ] },
]

[preview]
# run after change: yazi --clear-cache
max_width = 1920 # 900 default
max_height = 1200 # 600 default